{% extends 'base.html' %}

{% block title %}Update Profile{% endblock %}

{% block content %}
<section class="admin-form-section">
    <h1>Update Profile</h1>
    <form method="POST" class="admin-form">
        <div class="form-row">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" name="name" value="{{ profile.name or '' }}" required>
            </div>
            <div class="form-group">
                <label>Designation</label>
                <input type="text" name="designation" value="{{ profile.designation or '' }}" placeholder="e.g. Assistant Professor">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Department</label>
                <input type="text" name="department" value="{{ profile.department or '' }}">
            </div>
            <div class="form-group">
                <label>University</label>
                <input type="text" name="university" value="{{ profile.university or '' }}">
            </div>
        </div>
        <div class="form-group">
            <label>Bio</label>
            <textarea name="bio" rows="5">{{ profile.bio or '' }}</textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ profile.email or '' }}">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" value="{{ profile.phone or '' }}">
            </div>
        </div>
        <div class="form-group">
            <label>Office</label>
            <input type="text" name="office" value="{{ profile.office or '' }}" placeholder="e.g. Room 301, CS Building">
        </div>
        <div class="form-group">
            <label>Google Scholar URL</label>
            <input type="text" name="google_scholar" value="{{ profile.google_scholar or '' }}">
        </div>
        <div class="form-group">
            <label>GitHub URL</label>
            <input type="text" name="github" value="{{ profile.github or '' }}">
        </div>
        <div class="form-group">
            <label>LinkedIn URL</label>
            <input type="text" name="linkedin" value="{{ profile.linkedin or '' }}">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">Save Profile</button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn-outline">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
