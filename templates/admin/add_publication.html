{% extends 'base.html' %}

{% block title %}Add Publication{% endblock %}

{% block content %}
<section class="admin-form-section">
    <h1>Add New Publication</h1>
    <form method="POST" enctype="multipart/form-data" class="admin-form">
        <div class="form-group">
            <label>Title *</label>
            <input type="text" name="title" required>
        </div>
        <div class="form-group">
            <label>Authors *</label>
            <input type="text" name="authors" placeholder="e.g. Your Name, A. Kumar, S. Patel" required>
        </div>
        <div class="form-group">
            <label>Journal / Conference *</label>
            <input type="text" name="journal" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Year *</label>
                <input type="number" name="year" required>
            </div>
            <div class="form-group">
                <label>Category *</label>
                <select name="category" required>
                    <option value="Journal">Journal</option>
                    <option value="Conference">Conference</option>
                    <option value="Book Chapter">Book Chapter</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>DOI Link</label>
            <input type="text" name="doi" placeholder="https://doi.org/...">
        </div>
        <div class="form-group">
            <label>Abstract</label>
            <textarea name="abstract" rows="4"></textarea>
        </div>
        <div class="form-group">
            <label>Upload PDF</label>
            <input type="file" name="pdf" accept=".pdf">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">Add Publication</button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn-outline">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
