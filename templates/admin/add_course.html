{% extends 'base.html' %}

{% block title %}Add Course{% endblock %}

{% block content %}
<section class="admin-form-section">
    <h1>Add New Course</h1>
    <form method="POST" class="admin-form">
        <div class="form-row">
            <div class="form-group">
                <label>Course Name *</label>
                <input type="text" name="course_name" required>
            </div>
            <div class="form-group">
                <label>Course Code *</label>
                <input type="text" name="course_code" placeholder="e.g. CS 501" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Semester *</label>
                <select name="semester" required>
                    <option value="Spring">Spring</option>
                    <option value="Fall">Fall</option>
                    <option value="Summer">Summer</option>
                </select>
            </div>
            <div class="form-group">
                <label>Year *</label>
                <input type="number" name="year" required>
            </div>
        </div>
        <div class="form-group">
            <label>Level *</label>
            <select name="level" required>
                <option value="Undergraduate">Undergraduate</option>
                <option value="Graduate">Graduate</option>
            </select>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" rows="3"></textarea>
        </div>
        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" name="is_current">
                Currently teaching this course
            </label>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">Add Course</button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn-outline">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
